name: Build iPass (Extreme Optimized)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SDK_URL: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare & Test (Parallel)
        run: |
          # 并行运行：安装依赖 + 运行脚本测试
          (
            sudo apt-get update -qq
            sudo apt-get install -y -qq build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 python3-pyelftools rsync swig unzip zlib1g-dev file wget zstd
          ) &
          (
            chmod +x ./tests/check_sh_tests.sh ./scripts/static-check.sh
            ./tests/check_sh_tests.sh
            ./scripts/static-check.sh
          ) &
          wait

      - name: Cache SDK Base
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-base-x86-64-24.10.0

      - name: Setup SDK Base
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p sdk
          wget -qO- "${{ env.SDK_URL }}" | tar --zstd -xf - -C sdk --strip-components=1
          cd sdk
          # 初始 Git 优化
          git config --global http.postBuffer 524288000
          # 【核心优化】精简 Feeds 源，只保留必须的 base 和 luci
          sed -i '/routing/d; /telephony/d; /packages/d' feeds.conf.default

      - name: Cache Feeds Data
        uses: actions/cache@v4
        with:
          path: sdk/feeds
          key: feeds-minimized-${{ hashFiles('luci-app-ipass/Makefile') }}
          restore-keys: feeds-minimized-

      - name: Fast Feeds Sync
        working-directory: sdk
        run: |
          # 仅更新被精简后的必要 feeds
          for i in 1 2 3; do
            ./scripts/feeds update -a && break || sleep 5
          done
          ./scripts/feeds install -a

      - name: Turbo Build
        run: |
          # 极速同步源码
          rsync -a --delete luci-app-ipass/ sdk/package/luci-app-ipass/
          
          cd sdk
          # 预设配置
          [ -f .config ] || make defconfig
          echo "CONFIG_PACKAGE_luci-app-ipass=m" >> .config
          
          # 并行编译，并禁用不必要的辅助工具编译
          make package/luci-app-ipass/compile -j$(nproc) V=s IGNORE_ERRORS=m

      - name: Collect & Release Artifacts
        run: |
          mkdir -p artifacts
          find sdk/bin/packages -name 'luci-app-ipass*.ipk' -exec cp {} artifacts/ \;
          for ipk in artifacts/*.ipk; do
            ./scripts/package-run.sh "$ipk" "${ipk%.ipk}.run"
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: iPass-Package
          path: artifacts/*
          retention-days: 7

  release:
    name: Publish
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "iPass ${{ github.ref_name }}" \
            --generate-notes
