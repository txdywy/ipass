name: Build iPass (Extreme Optimized)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SDK_URL: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Turbo Build Workflow
        run: |
          # 1. 极致提速：将依赖安装和静态测试并行
          echo "::group::Install Dependencies & Run Tests"
          (
            sudo apt-get update -qq
            sudo apt-get install -y -qq build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 python3-pyelftools rsync swig unzip zlib1g-dev file wget zstd
          ) &
          (
            chmod +x ./tests/check_sh_tests.sh ./scripts/static-check.sh
            ./tests/check_sh_tests.sh
            ./scripts/static-check.sh
          ) &
          wait
          echo "::endgroup::"

          # 2. 极致提速：无状态 SDK 环境 (抛弃慢速的文件缓存，直接利用 GHA 千兆内网直连下载)
          echo "::group::Download & Setup SDK"
          mkdir -p sdk
          wget -qO- "${{ env.SDK_URL }}" | tar --zstd -xf - -C sdk --strip-components=1
          cd sdk
          # 【核心优化】精简 Feeds 源，仅保留必须的 base 和 luci，丢弃 routing, telephony 等
          sed -i '/routing/d; /telephony/d; /packages/d' feeds.conf.default
          echo "::endgroup::"

          # 3. 极致提速：轻量级 feeds 拉取
          echo "::group::Update & Install Feeds"
          git config --global http.postBuffer 524288000
          for i in 1 2 3; do
            ./scripts/feeds update -a && break || sleep 5
          done
          ./scripts/feeds install -a
          echo "::endgroup::"

          # 4. 极速编译
          echo "::group::Compile Package"
          rsync -a --delete ../luci-app-ipass/ package/luci-app-ipass/
          [ -f .config ] || make defconfig
          echo "CONFIG_PACKAGE_luci-app-ipass=m" >> .config
          make package/luci-app-ipass/compile -j$(nproc) V=s IGNORE_ERRORS=m
          echo "::endgroup::"

          # 5. 整理产物
          echo "::group::Collect Artifacts"
          mkdir -p ../artifacts
          find bin/packages -name 'luci-app-ipass*.ipk' -exec cp {} ../artifacts/ \;
          cd ../artifacts
          for ipk in *.ipk; do
            ../scripts/package-run.sh "$ipk" "${ipk%.ipk}.run"
          done
          echo "::endgroup::"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: iPass-Package
          path: artifacts/*
          retention-days: 7

  release:
    name: Publish
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "iPass ${{ github.ref_name }}" \
            --generate-notes
