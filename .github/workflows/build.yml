name: Build luci-app-ipass

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: armsr-armv8
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/armsr/armv8/openwrt-sdk-24.10.0-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - target: x86-64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 python3-pyelftools python3-setuptools rsync swig unzip zlib1g-dev file wget zstd

      - name: Run repository checks
        run: |
          chmod +x ./tests/check_sh_tests.sh ./scripts/static-check.sh
          ./tests/check_sh_tests.sh
          ./scripts/static-check.sh

      - name: Download OpenWrt SDK
        run: |
          wget -O sdk.tar.zst "${{ matrix.sdk_url }}"
          tar --zstd -xf sdk.tar.zst
          sdk_dir="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' -print -quit)"
          test -n "$sdk_dir"
          echo "SDK_DIR=${sdk_dir#./}" >> "$GITHUB_ENV"

      - name: Install package into SDK
        run: |
          mkdir -p "$SDK_DIR/package/luci-app-ipass"
          rsync -a --delete luci-app-ipass/ "$SDK_DIR/package/luci-app-ipass/"

      - name: Update feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make defconfig
          echo "CONFIG_PACKAGE_luci-app-ipass=m" >> .config
          make defconfig

      - name: Build package
        working-directory: ${{ env.SDK_DIR }}
        run: make package/luci-app-ipass/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find "$SDK_DIR/bin/packages" -name 'luci-app-ipass*.ipk' -exec cp {} artifacts/ \;
          test -n "$(find artifacts -name 'luci-app-ipass*.ipk' -print -quit)"
          for ipk in artifacts/luci-app-ipass*.ipk; do
            base="$(basename "$ipk" .ipk)"
            target_ipk="artifacts/${base}-${{ matrix.target }}.ipk"
            target_run="artifacts/${base}-${{ matrix.target }}.run"
            mv "$ipk" "$target_ipk"
            ./scripts/package-run.sh "$target_ipk" "$target_run"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-ipass-${{ matrix.target }}
          path: |
            artifacts/*.ipk
            artifacts/*.run

  release:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes
