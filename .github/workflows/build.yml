name: Build iPass (Optimized)

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: armsr-armv8
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/armsr/armv8/openwrt-sdk-24.10.0-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - target: x86-64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-${{ matrix.target }}-24.10.0-v2

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 python3-pyelftools rsync swig unzip zlib1g-dev file wget zstd

      - name: Setup SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        timeout-minutes: 8
        run: |
          mkdir sdk
          for i in 1 2 3; do
            wget -q --timeout=30 --tries=2 -O sdk.tar.zst "${{ matrix.sdk_url }}" && break
            rm -f sdk.tar.zst
            sleep 10
          done
          test -s sdk.tar.zst
          tar --zstd -xf sdk.tar.zst -C sdk --strip-components=1
          cd sdk
          # 初始设置 git 缓冲
          git config --global http.postBuffer 524288000

      - name: Cache Feeds
        uses: actions/cache@v4
        with:
          path: sdk/feeds
          key: feeds-${{ matrix.target }}-${{ hashFiles('luci-app-ipass/Makefile') }}
          restore-keys: |
            feeds-${{ matrix.target }}-

      - name: Update and Install Feeds
        working-directory: sdk
        run: |
          # 极致提速：如果缓存存在，update 会非常快
          for i in 1 2 3; do
            ./scripts/feeds update -a && break || sleep 10
          done
          ./scripts/feeds install -a

      - name: Build iPass
        run: |
          # 将项目同步到 SDK
          mkdir -p sdk/package/luci-app-ipass
          rsync -a --delete luci-app-ipass/ sdk/package/luci-app-ipass/
          
          cd sdk
          rm -f bin/packages/*/base/luci-app-ipass*.ipk
          make package/luci-app-ipass/clean V=s || true
          make defconfig
          echo "CONFIG_PACKAGE_luci-app-ipass=m" >> .config
          
          # 极致提速：使用多核并行编译
          make package/luci-app-ipass/compile -j$(nproc) V=s

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find sdk/bin/packages -name 'luci-app-ipass*.ipk' -exec cp {} artifacts/ \;
          test -n "$(find artifacts -name 'luci-app-ipass*.ipk' -print -quit)"
          # 生成运行脚本
          for ipk in artifacts/*.ipk; do
            base="$(basename "$ipk" .ipk)"
            target_ipk="artifacts/${base}-${{ matrix.target }}.ipk"
            target_run="artifacts/${base}-${{ matrix.target }}.run"
            mv "$ipk" "$target_ipk"
            ./scripts/package-run.sh "$target_ipk" "$target_run"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iPass-package-${{ matrix.target }}
          path: artifacts/*

  release:
    name: Publish Release
    runs-on: ubuntu-24.04
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes
