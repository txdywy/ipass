<%+header%>

<style>
#ipass-app {
	--ipass-ink: #17202a;
	--ipass-muted: #687789;
	--ipass-soft: #f4f7fb;
	--ipass-line: #dde6ef;
	--ipass-blue: #2377ff;
	--ipass-green: #19a86b;
	--ipass-red: #df3f4f;
	--ipass-amber: #d99016;
	--ipass-panel: rgba(255,255,255,0.94);
	color: var(--ipass-ink);
}

.ipass-hero {
	position: relative;
	overflow: hidden;
	margin: 16px 0 18px;
	padding: 18px;
	border: 1px solid #dce6f1;
	border-radius: 8px;
	background:
		radial-gradient(circle at 12% 0%, rgba(35,119,255,0.18), transparent 30%),
		radial-gradient(circle at 88% 10%, rgba(25,168,107,0.15), transparent 28%),
		linear-gradient(135deg, #ffffff 0%, #f6f9fd 56%, #eef5ff 100%);
	box-shadow: 0 16px 42px rgba(23,32,42,0.08);
}
.ipass-hero::after {
	content: '';
	position: absolute;
	inset: auto -20% -55% 45%;
	height: 150px;
	background: linear-gradient(90deg, transparent, rgba(35,119,255,0.12), transparent);
	transform: rotate(-8deg);
	pointer-events: none;
}
.ipass-hero-main {
	position: relative;
	z-index: 1;
	display: flex;
	align-items: flex-start;
	justify-content: space-between;
	gap: 18px;
}
.ipass-title-group {
	min-width: 220px;
}
.ipass-title-group h2 {
	margin: 0 0 6px;
	font-size: 24px;
	line-height: 1.2;
	font-weight: 800;
	color: var(--ipass-ink);
}
.ipass-summary {
	min-height: 22px;
	font-size: 13px;
	line-height: 1.5;
	font-weight: 600;
	color: var(--ipass-muted);
}
.ipass-actions {
	display: flex;
	flex-wrap: wrap;
	justify-content: flex-end;
	gap: 8px;
}
.ipass-actions .cbi-button {
	border-radius: 8px;
	font-size: 12px;
	font-weight: 700;
}

.ipass-metrics {
	position: relative;
	z-index: 1;
	display: grid;
	grid-template-columns: repeat(4, minmax(120px, 1fr));
	gap: 10px;
	margin-top: 18px;
}
.ipass-metric {
	padding: 12px;
	border: 1px solid rgba(221,230,239,0.9);
	border-radius: 8px;
	background: rgba(255,255,255,0.72);
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
}
.ipass-metric-label {
	display: block;
	margin-bottom: 4px;
	font-size: 11px;
	font-weight: 700;
	color: var(--ipass-muted);
}
.ipass-metric-value {
	display: block;
	font-size: 22px;
	line-height: 1.1;
	font-weight: 800;
	color: var(--ipass-ink);
}
.ipass-metric.ok .ipass-metric-value { color: var(--ipass-green); }
.ipass-metric.fail .ipass-metric-value { color: var(--ipass-red); }
.ipass-metric.speed .ipass-metric-value { color: var(--ipass-blue); }

.ipass-progress {
	position: relative;
	z-index: 1;
	margin-top: 16px;
	height: 8px;
	overflow: hidden;
	border-radius: 999px;
	background: rgba(104,119,137,0.16);
}
.ipass-progress-fill {
	width: 0%;
	height: 100%;
	border-radius: inherit;
	background: linear-gradient(90deg, var(--ipass-blue), var(--ipass-green));
	box-shadow: 0 0 18px rgba(35,119,255,0.32);
	transition: width 0.35s ease;
}

.ipass-latency-chart {
	position: relative;
	overflow: hidden;
	margin: 18px 0;
	padding: 15px;
	border: 1px solid #dce6f1;
	border-radius: 8px;
	background:
		linear-gradient(135deg, rgba(255,255,255,0.96), rgba(247,250,254,0.94)),
		#fff;
	box-shadow: 0 12px 30px rgba(23,32,42,0.07);
}
.ipass-latency-chart::before {
	content: '';
	position: absolute;
	inset: 0;
	background:
		linear-gradient(90deg, rgba(25,168,107,0.08), transparent 28%),
		linear-gradient(90deg, transparent 55%, rgba(223,63,79,0.08));
	pointer-events: none;
}
.ipass-chart-head {
	position: relative;
	z-index: 1;
	display: flex;
	align-items: flex-start;
	justify-content: space-between;
	gap: 12px;
	margin-bottom: 13px;
}
.ipass-chart-title {
	font-size: 16px;
	line-height: 1.25;
	font-weight: 800;
	color: var(--ipass-ink);
}
.ipass-chart-subtitle {
	margin-top: 3px;
	font-size: 11px;
	line-height: 1.35;
	font-weight: 700;
	color: var(--ipass-muted);
}
.ipass-chart-legend {
	display: flex;
	align-items: center;
	gap: 7px;
	flex: 0 0 auto;
	font-size: 10px;
	font-weight: 800;
	color: var(--ipass-muted);
}
.ipass-chart-scale {
	width: 92px;
	height: 8px;
	border-radius: 999px;
	background: linear-gradient(90deg, var(--ipass-green), var(--ipass-amber), var(--ipass-red));
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
}
.ipass-chart-list {
	position: relative;
	z-index: 1;
	display: grid;
	gap: 8px;
	min-height: 46px;
}
.ipass-chart-empty {
	position: relative;
	z-index: 1;
	padding: 14px;
	border: 1px dashed #c8d5e2;
	border-radius: 8px;
	background: rgba(255,255,255,0.72);
	color: var(--ipass-muted);
	font-size: 12px;
	font-weight: 700;
	text-align: center;
}
.ipass-chart-row {
	display: grid;
	grid-template-columns: minmax(84px, 128px) 1fr 58px;
	align-items: center;
	gap: 10px;
	padding: 8px 10px;
	border: 1px solid rgba(221,230,239,0.78);
	border-radius: 8px;
	background: rgba(255,255,255,0.76);
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
	animation: ipass-chart-rise 0.34s ease both;
}
@keyframes ipass-chart-rise {
	from { opacity: 0; transform: translateY(8px); }
	to { opacity: 1; transform: translateY(0); }
}
.ipass-chart-name {
	min-width: 0;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
	font-size: 12px;
	font-weight: 800;
	color: #26384b;
}
.ipass-chart-track {
	position: relative;
	height: 12px;
	overflow: hidden;
	border-radius: 999px;
	background: #e8eef5;
}
.ipass-chart-bar-fill {
	width: 0%;
	height: 100%;
	border-radius: inherit;
	background: linear-gradient(90deg, var(--ipass-green), #53c992);
	box-shadow: 0 0 14px rgba(25,168,107,0.22);
	transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.ipass-chart-row.medium .ipass-chart-bar-fill {
	background: linear-gradient(90deg, #55c987, var(--ipass-amber));
	box-shadow: 0 0 14px rgba(217,144,22,0.18);
}
.ipass-chart-row.slow .ipass-chart-bar-fill,
.ipass-chart-row.fail .ipass-chart-bar-fill {
	background: linear-gradient(90deg, var(--ipass-amber), var(--ipass-red));
	box-shadow: 0 0 14px rgba(223,63,79,0.2);
}
.ipass-chart-value {
	text-align: right;
	font-size: 11px;
	font-weight: 900;
	color: #26384b;
}
.ipass-chart-row.fail .ipass-chart-value {
	color: var(--ipass-red);
}

.ipass-distribution-panel {
	position: relative;
	overflow: hidden;
	margin: 0 0 18px;
	padding: 15px;
	border: 1px solid #dce6f1;
	border-radius: 8px;
	background:
		linear-gradient(135deg, rgba(255,255,255,0.97), rgba(248,251,255,0.95)),
		#fff;
	box-shadow: 0 12px 30px rgba(23,32,42,0.06);
}
.ipass-distribution-panel::before {
	content: '';
	position: absolute;
	inset: -1px;
	background: linear-gradient(120deg, rgba(35,119,255,0.08), transparent 36%, rgba(25,168,107,0.08));
	pointer-events: none;
}
.ipass-dist-head {
	position: relative;
	z-index: 1;
	display: flex;
	align-items: flex-start;
	justify-content: space-between;
	gap: 12px;
	margin-bottom: 13px;
}
.ipass-dist-title {
	font-size: 16px;
	line-height: 1.25;
	font-weight: 800;
	color: var(--ipass-ink);
}
.ipass-dist-subtitle {
	margin-top: 3px;
	font-size: 11px;
	line-height: 1.35;
	font-weight: 700;
	color: var(--ipass-muted);
}
.ipass-dist-stats {
	position: relative;
	z-index: 1;
	display: grid;
	grid-template-columns: repeat(6, minmax(78px, 1fr));
	gap: 8px;
	margin-bottom: 14px;
}
.ipass-dist-stat {
	padding: 9px 10px;
	border: 1px solid rgba(221,230,239,0.82);
	border-radius: 8px;
	background: rgba(255,255,255,0.78);
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.86);
}
.ipass-dist-label {
	display: block;
	margin-bottom: 3px;
	font-size: 10px;
	font-weight: 800;
	color: var(--ipass-muted);
}
.ipass-dist-value {
	display: block;
	font-size: 16px;
	line-height: 1.1;
	font-weight: 900;
	color: #243447;
}
.ipass-dist-plot {
	position: relative;
	z-index: 1;
	padding: 18px 0 25px;
}
.ipass-dist-axis {
	position: relative;
	height: 18px;
	overflow: visible;
	border-radius: 999px;
	background:
		linear-gradient(90deg,
			rgba(25,168,107,0.95) 0%,
			rgba(25,168,107,0.78) 35%,
			rgba(217,144,22,0.78) 70%,
			rgba(223,63,79,0.9) 100%);
	box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 10px 22px rgba(23,32,42,0.08);
}
.ipass-dist-band {
	position: absolute;
	top: -8px;
	bottom: -8px;
	width: 1px;
	background: rgba(255,255,255,0.76);
	box-shadow: 0 0 0 1px rgba(23,32,42,0.08);
}
.ipass-dist-band span {
	position: absolute;
	top: 28px;
	left: 50%;
	transform: translateX(-50%);
	white-space: nowrap;
	font-size: 9px;
	font-weight: 900;
	color: var(--ipass-muted);
}
.ipass-dist-marker {
	position: absolute;
	top: 50%;
	width: 12px;
	height: 12px;
	border: 2px solid #fff;
	border-radius: 50%;
	background: #243447;
	box-shadow: 0 5px 12px rgba(23,32,42,0.2);
	transform: translate(-50%, -50%);
	transition: left 0.48s cubic-bezier(0.22, 1, 0.36, 1), transform 0.2s ease;
}
.ipass-dist-marker:hover {
	transform: translate(-50%, -50%) scale(1.35);
	z-index: 3;
}
.ipass-dist-marker.fast { background: var(--ipass-green); }
.ipass-dist-marker.medium { background: var(--ipass-amber); }
.ipass-dist-marker.slow,
.ipass-dist-marker.fail { background: var(--ipass-red); }
.ipass-dist-marker::after {
	content: attr(data-label);
	position: absolute;
	left: 50%;
	bottom: 17px;
	max-width: 120px;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
	padding: 3px 6px;
	border-radius: 6px;
	background: rgba(23,32,42,0.9);
	color: #fff;
	font-size: 10px;
	font-weight: 800;
	opacity: 0;
	pointer-events: none;
	transform: translateX(-50%) translateY(4px);
	transition: opacity 0.16s ease, transform 0.16s ease;
}
.ipass-dist-marker:hover::after {
	opacity: 1;
	transform: translateX(-50%) translateY(0);
}
.ipass-dist-empty {
	position: relative;
	z-index: 1;
	padding: 14px;
	border: 1px dashed #c8d5e2;
	border-radius: 8px;
	background: rgba(255,255,255,0.72);
	color: var(--ipass-muted);
	font-size: 12px;
	font-weight: 700;
	text-align: center;
}

.ipass-filterbar {
	display: flex;
	flex-wrap: wrap;
	align-items: center;
	gap: 8px;
	margin: 0 0 18px;
}
.ipass-filter-btn {
	border: 1px solid var(--ipass-line);
	border-radius: 8px;
	background: #fff;
	color: var(--ipass-muted);
	padding: 7px 12px;
	font-size: 12px;
	font-weight: 800;
	cursor: pointer;
	transition: border-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease, transform 0.2s ease;
}
.ipass-filter-btn:hover {
	transform: translateY(-1px);
	border-color: #b8c8d8;
	color: var(--ipass-ink);
}
.ipass-filter-btn.active {
	border-color: rgba(35,119,255,0.45);
	background: #eef5ff;
	color: #175fd0;
	box-shadow: 0 6px 18px rgba(35,119,255,0.12);
}

.ipass-section-title {
	display: flex;
	align-items: center;
	justify-content: space-between;
	gap: 12px;
	margin: 22px 0 12px;
	color: #243447;
	font-size: 17px;
	font-weight: 800;
}
.ipass-section-title::before {
	content: '';
	width: 7px;
	height: 24px;
	border-radius: 999px;
	background: linear-gradient(180deg, var(--ipass-blue), var(--ipass-green));
	box-shadow: 0 6px 16px rgba(35,119,255,0.22);
}
.ipass-section-title span {
	flex: 1;
}

.ipass-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
	gap: 14px;
	margin-bottom: 30px;
}
.ipass-card {
	position: relative;
	min-height: 230px;
	overflow: hidden;
	border: 1px solid var(--ipass-line);
	border-radius: 8px;
	padding: 14px;
	background:
		linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,252,255,0.96)),
		var(--ipass-panel);
	box-shadow: 0 8px 22px rgba(23,32,42,0.06);
	transition: border-color 0.24s ease, box-shadow 0.24s ease, transform 0.24s ease;
}
.ipass-card::before {
	content: '';
	position: absolute;
	inset: 0 auto 0 0;
	width: 4px;
	background: #c9d6e3;
	transition: background 0.24s ease;
}
.ipass-card::after {
	content: '';
	position: absolute;
	top: -42px;
	right: -44px;
	width: 112px;
	height: 112px;
	border-radius: 50%;
	background: rgba(104,119,137,0.08);
	pointer-events: none;
}
.ipass-card:hover {
	transform: translateY(-3px);
	border-color: #b9c9d9;
	box-shadow: 0 16px 36px rgba(23,32,42,0.11);
}
.ipass-card.ok::before { background: linear-gradient(180deg, var(--ipass-green), #8ee0ba); }
.ipass-card.fail::before { background: linear-gradient(180deg, var(--ipass-red), #ff9b9b); }
.ipass-card.checking::before { background: linear-gradient(180deg, var(--ipass-blue), #72c6ff); }
.ipass-card.queued::before { background: linear-gradient(180deg, #8a99aa, #c5d1dc); }
.ipass-card.checking {
	background:
		linear-gradient(100deg, rgba(255,255,255,0.98) 20%, rgba(238,245,255,0.98) 44%, rgba(255,255,255,0.98) 70%);
	background-size: 220% 100%;
	animation: ipass-shimmer 1.4s ease-in-out infinite;
}
@keyframes ipass-shimmer {
	0% { background-position: 120% 0; }
	100% { background-position: -120% 0; }
}

.ipass-card-header {
	position: relative;
	z-index: 1;
	display: flex;
	align-items: center;
	gap: 12px;
	margin-bottom: 13px;
}
.ipass-logo-wrap {
	display: flex;
	align-items: center;
	justify-content: center;
	width: 42px;
	height: 42px;
	border-radius: 8px;
	background: linear-gradient(145deg, #ffffff, #edf3fa);
	border: 1px solid rgba(221,230,239,0.9);
	box-shadow: inset 0 1px 0 #fff, 0 8px 20px rgba(23,32,42,0.08);
	flex: 0 0 auto;
}
.ipass-logo {
	width: 28px;
	height: 28px;
	border-radius: 6px;
	object-fit: contain;
}
.ipass-name-box {
	min-width: 0;
	flex: 1;
}
.ipass-name-line {
	display: flex;
	align-items: center;
	gap: 8px;
	min-width: 0;
}
.ipass-name {
	min-width: 0;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
	font-size: 15px;
	line-height: 1.25;
	font-weight: 800;
	color: var(--ipass-ink);
}
.ipass-status-badge {
	flex: 0 0 auto;
	padding: 2px 7px;
	border-radius: 999px;
	background: #eef2f6;
	color: var(--ipass-muted);
	font-size: 10px;
	line-height: 1.5;
	font-weight: 800;
}
.ipass-card.ok .ipass-status-badge { background: #e8f8f1; color: #11794a; }
.ipass-card.fail .ipass-status-badge { background: #fff0f1; color: #b72232; }
.ipass-card.checking .ipass-status-badge { background: #edf5ff; color: #175fd0; }
.ipass-card.queued .ipass-status-badge { background: #f1f4f8; color: #5f7082; }
.ipass-url {
	display: block;
	margin-top: 3px;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
	font-size: 11px;
	line-height: 1.35;
	color: var(--ipass-muted);
}

.ipass-stats {
	position: relative;
	z-index: 1;
	display: grid;
	gap: 8px;
	padding: 10px;
	border: 1px solid rgba(221,230,239,0.82);
	border-radius: 8px;
	background: rgba(246,249,253,0.78);
}
.ipass-row {
	display: grid;
	grid-template-columns: 18px 1fr auto;
	align-items: center;
	gap: 8px;
	min-height: 24px;
	font-size: 12px;
}
.ipass-dot {
	width: 10px;
	height: 10px;
	border-radius: 50%;
	background: #c5d1dc;
	box-shadow: 0 0 0 4px rgba(197,209,220,0.16);
}
.ipass-dot.ok { background: var(--ipass-green); box-shadow: 0 0 0 4px rgba(25,168,107,0.16); }
.ipass-dot.fail { background: var(--ipass-red); box-shadow: 0 0 0 4px rgba(223,63,79,0.15); }
.ipass-dot.checking { background: var(--ipass-blue); box-shadow: 0 0 0 4px rgba(35,119,255,0.15); }
.ipass-label {
	color: var(--ipass-muted);
	font-weight: 700;
}
.ipass-val {
	font-weight: 800;
	color: #26384b;
}
.val-fast { color: var(--ipass-green) !important; }
.val-medium { color: var(--ipass-amber) !important; }
.val-slow { color: var(--ipass-red) !important; }

.ipass-latency-meter {
	position: relative;
	z-index: 1;
	margin-top: 11px;
	height: 7px;
	overflow: hidden;
	border-radius: 999px;
	background: #e8eef5;
}
.ipass-latency-fill {
	width: 0%;
	height: 100%;
	border-radius: inherit;
	background: linear-gradient(90deg, var(--ipass-green), var(--ipass-amber), var(--ipass-red));
	transition: width 0.35s ease;
}
.ipass-error-msg {
	position: relative;
	z-index: 1;
	margin-top: 10px;
	padding: 8px 9px;
	border: 1px solid #ffd2d7;
	border-radius: 8px;
	background: #fff5f6;
	color: #b72232;
	font-size: 11px;
	line-height: 1.45;
	font-weight: 700;
}

.ipass-footer {
	position: relative;
	z-index: 1;
	display: flex;
	justify-content: space-between;
	align-items: center;
	gap: 10px;
	margin-top: 12px;
}
.ipass-time {
	min-width: 0;
	overflow: hidden;
	text-overflow: ellipsis;
	white-space: nowrap;
	font-size: 10px;
	font-weight: 700;
	color: #8a99aa;
}
.ipass-recheck-btn {
	flex: 0 0 auto;
	padding: 5px 11px;
	border: 1px solid #cfdbe7;
	border-radius: 8px;
	background: #fff;
	color: #35506b;
	font-size: 11px;
	font-weight: 800;
	cursor: pointer;
	transition: color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}
.ipass-recheck-btn:hover:not(:disabled) {
	border-color: rgba(35,119,255,0.55);
	color: #175fd0;
	box-shadow: 0 6px 18px rgba(35,119,255,0.12);
}
.ipass-recheck-btn:disabled {
	cursor: progress;
	opacity: 0.62;
}
.ipass-empty {
	display: none;
	padding: 22px;
	border: 1px dashed #c8d5e2;
	border-radius: 8px;
	background: #fbfdff;
	color: var(--ipass-muted);
	font-size: 13px;
	font-weight: 700;
	text-align: center;
}
@media (max-width: 760px) {
	.ipass-hero-main {
		flex-direction: column;
	}
	.ipass-actions {
		justify-content: flex-start;
		width: 100%;
	}
	.ipass-metrics {
		grid-template-columns: repeat(2, minmax(0, 1fr));
	}
	.ipass-chart-head {
		flex-direction: column;
	}
	.ipass-chart-row {
		grid-template-columns: minmax(74px, 96px) 1fr 52px;
		gap: 8px;
	}
	.ipass-dist-head {
		flex-direction: column;
	}
	.ipass-dist-stats {
		grid-template-columns: repeat(2, minmax(0, 1fr));
	}
	.ipass-grid {
		grid-template-columns: 1fr;
	}
}
@media (prefers-reduced-motion: reduce) {
	.ipass-card,
	.ipass-filter-btn,
	.ipass-progress-fill,
	.ipass-latency-fill,
	.ipass-chart-bar-fill,
	.ipass-dist-marker {
		transition: none;
	}
	.ipass-chart-row,
	.ipass-card.checking {
		animation: none;
	}
}
</style>

<div id="ipass-app">
	<div class="ipass-hero">
		<div class="ipass-hero-main">
			<div class="ipass-title-group">
				<h2 name="content">iPass</h2>
				<div id="ipass-summary" class="ipass-summary">正在连接 iPass 引擎...</div>
			</div>
			<div class="ipass-actions">
				<a class="btn cbi-button" href="<%=url('admin/services/ipass/sites')%>">站点配置</a>
				<button id="ipass-check-all" class="btn cbi-button cbi-button-apply">重新检测全量</button>
			</div>
		</div>
		<div class="ipass-metrics">
			<div class="ipass-metric">
				<span class="ipass-metric-label">站点总数</span>
				<span id="metric-total" class="ipass-metric-value">0</span>
			</div>
			<div class="ipass-metric ok">
				<span class="ipass-metric-label">畅通</span>
				<span id="metric-ok" class="ipass-metric-value">0</span>
			</div>
			<div class="ipass-metric fail">
				<span class="ipass-metric-label">异常</span>
				<span id="metric-fail" class="ipass-metric-value">0</span>
			</div>
			<div class="ipass-metric speed">
				<span class="ipass-metric-label">平均时延</span>
				<span id="metric-latency" class="ipass-metric-value">-</span>
			</div>

		<div class="ipass-progress" aria-hidden="true">

	<div class="ipass-latency-chart">

			<div>
				<div class="ipass-chart-title">延迟表现排行</div>

				<span class="ipass-chart-scale"></span>

	<div class="ipass-distribution-panel">

			<div>
				<div class="ipass-dist-title">统计分布定位</div>
				<div id="ipass-dist-subtitle" class="ipass-dist-subtitle">用分位数和离散度观察每个站点处在本轮样本中的位置。</div>
			</div>
		</div>
		<div class="ipass-dist-stats">
			<div class="ipass-dist-stat">
				<span class="ipass-dist-label">中位数</span>
				<span id="dist-median" class="ipass-dist-value">-</span>
			</div>
			<div class="ipass-dist-stat">
				<span class="ipass-dist-label">P90</span>
				<span id="dist-p90" class="ipass-dist-value">-</span>
			</div>
			<div class="ipass-dist-stat">
				<span class="ipass-dist-label">IQR</span>
				<span id="dist-iqr" class="ipass-dist-value">-</span>
			</div>
			<div class="ipass-dist-stat">
				<span class="ipass-dist-label">尾部放大</span>
				<span id="dist-tail" class="ipass-dist-value">-</span>
			</div>
			<div class="ipass-dist-stat">
				<span class="ipass-dist-label">异常</span>
				<span id="dist-failed" class="ipass-dist-value">0</span>
			</div>
			<div class="ipass-dist-stat">
				<span class="ipass-dist-label">样本数</span>
				<span id="dist-sample" class="ipass-dist-value">0</span>

	<div class="ipass-filterbar" data-filter="all">

		<button class="ipass-filter-btn" data-filter="ok" type="button">畅通</button>
		<button class="ipass-filter-btn" data-filter="fail" type="button">异常</button>
		<button class="ipass-filter-btn" data-filter="checking" type="button">检测中</button>

	<div id="ipass-empty" class="ipass-empty">当前筛选下没有站点。</div>

	<div id="section-domestic" style="display:none;">
		<div class="ipass-section-title"><span>国内服务 (Domestic)</span></div>
		<div id="grid-domestic" class="ipass-grid"></div>
	</div>

	<div id="section-international" style="display:none;">
		<div class="ipass-section-title"><span>国际服务 (International)</span></div>
		<div id="grid-international" class="ipass-grid"></div>
	</div>

	<div id="grid-custom" style="display:none;">
		<div class="ipass-section-title"><span>自定义站点 (Custom)</span></div>
		<div id="grid-other" class="ipass-grid"></div>
	</div>
</div>

<script type="text/javascript">
(function() {
	'use strict';

	var summary = document.getElementById('ipass-summary');
	var btnCheckAll = document.getElementById('ipass-check-all');
	var progressFill = document.getElementById('ipass-progress-fill');
	var emptyState = document.getElementById('ipass-empty');
	var filterbar = document.querySelector('.ipass-filterbar');
	var metricTotal = document.getElementById('metric-total');
	var metricOk = document.getElementById('metric-ok');
	var metricFail = document.getElementById('metric-fail');
	var metricLatency = document.getElementById('metric-latency');
	var chartList = document.getElementById('ipass-chart-list');
	var chartSubtitle = document.getElementById('ipass-chart-subtitle');
	var distSubtitle = document.getElementById('ipass-dist-subtitle');
	var distMedian = document.getElementById('dist-median');
	var distP90 = document.getElementById('dist-p90');
	var distIqr = document.getElementById('dist-iqr');
	var distTail = document.getElementById('dist-tail');
	var distFailed = document.getElementById('dist-failed');
	var distSample = document.getElementById('dist-sample');
	var distPlot = document.getElementById('ipass-dist-plot');

	var grids = {
		'国内': document.getElementById('grid-domestic'),
		'国际': document.getElementById('grid-international'),
		'other': document.getElementById('grid-other')
	};
	var sections = {
		'国内': document.getElementById('section-domestic'),
		'国际': document.getElementById('section-international'),
		'other': document.getElementById('grid-custom')
	};

	var listEndpoint = '<%=url("admin/services/ipass/list")%>';
	var checkEndpoint = '<%=url("admin/services/ipass/check")%>';
	var MAX_CONCURRENT_CHECKS = 4;

	var sitesData = [];
	var checkResults = {};
	var checkingSites = {};
	var queuedSites = {};
	var checkQueue = [];
	var activeChecks = 0;
	var activeFilter = 'all';

	function getDomain(url) {
		var parts = String(url || '').split('/');
		return parts.length > 2 ? parts[2] : '';
	}

	function getLatencyClass(ms) {
		var sec = parseFloat(ms);
		if (isNaN(sec)) return '';
		if (sec < 0.25) return 'val-fast';
		if (sec < 0.75) return 'val-medium';
		return 'val-slow';
	}

	function getLatencyWidth(ms) {
		var sec = parseFloat(ms);
		if (isNaN(sec) || sec <= 0) return 0;
		return Math.max(8, Math.min(100, Math.round((sec / 1.5) * 100)));
	}

	function getLatencyTone(ms, failed) {
		var sec = parseFloat(ms);
		if (failed) return 'fail';
		if (isNaN(sec)) return 'fail';
		if (sec < 0.25) return 'fast';
		if (sec < 0.75) return 'medium';
		return 'slow';
	}

	function percentile(sorted, p) {
		if (!sorted.length) return 0;
		if (sorted.length === 1) return sorted[0];
		var index = (sorted.length - 1) * p;
		var lower = Math.floor(index);
		var upper = Math.ceil(index);
		if (lower === upper) return sorted[lower];
		return sorted[lower] + (sorted[upper] - sorted[lower]) * (index - lower);
	}

	function calculateLatencyStats(values) {
		if (!values.length) {
			return { count: 0, min: 0, max: 0, mean: 0, median: 0, p25: 0, p75: 0, p90: 0, stddev: 0 };
		}

		var sorted = values.slice().sort(function(a, b) { return a - b; });
		var total = 0;
		for (var i = 0; i < sorted.length; i++) total += sorted[i];
		var mean = total / sorted.length;
		var variance = 0;
		for (var j = 0; j < sorted.length; j++) variance += Math.pow(sorted[j] - mean, 2);
		variance = variance / sorted.length;

		return {
			count: sorted.length,
			min: sorted[0],
			max: sorted[sorted.length - 1],
			mean: mean,
			median: percentile(sorted, 0.5),
			p25: percentile(sorted, 0.25),
			p75: percentile(sorted, 0.75),
			p90: percentile(sorted, 0.9),
			stddev: Math.sqrt(variance)
		};
	}

	function formatMs(value) {
		return value > 0 ? Math.round(value) + 'ms' : '-';
	}

	function formatRatio(value) {
		return value > 0 ? value.toFixed(1) + 'x' : '-';
	}

	function getLatencyPosition(ms) {
		if (ms <= 250) return Math.max(0, Math.round((ms / 250) * 35));
		if (ms <= 750) return 35 + Math.round(((ms - 250) / 500) * 35);
		if (ms <= 1500) return 70 + Math.round(((ms - 750) / 750) * 20);
		return 90 + Math.min(10, Math.round(((Math.min(ms, 3000) - 1500) / 1500) * 10));
	}

	function getCardState(siteId) {
		if (checkingSites[siteId]) return 'checking';
		if (queuedSites[siteId]) return 'checking';
		if (!checkResults[siteId]) return 'pending';
		return checkResults[siteId].ok ? 'ok' : 'fail';
	}

	function setDot(row, state) {
		var dot = row.querySelector('.ipass-dot');
		dot.className = 'ipass-dot' + (state ? ' ' + state : '');
	}

	function updateSummary() {
		var total = sitesData.length;
		var checked = 0;
		var failed = 0;
		var ok = 0;
		var checking = 0;
		var queued = 0;
		var latencyTotal = 0;
		var latencyCount = 0;

		for (var i = 0; i < sitesData.length; i++) {
			var siteId = sitesData[i].id;
			var result = checkResults[siteId];
			if (checkingSites[siteId]) checking++;
			if (queuedSites[siteId]) queued++;
			if (!result) continue;
			checked++;
			if (result.ok) ok++;
			else failed++;
			if (result.time_total && parseFloat(result.time_total) > 0) {
				latencyTotal += parseFloat(result.time_total);
				latencyCount++;
			}
		}

		metricTotal.textContent = total;
		metricOk.textContent = ok;
		metricFail.textContent = failed;
		metricLatency.textContent = latencyCount ? Math.round((latencyTotal / latencyCount) * 1000) + 'ms' : '-';
		progressFill.style.width = (total ? Math.round((checked / total) * 100) : 0) + '%';

		if (total === 0) {
			summary.textContent = '还没有启用的检测站点，请先添加或启用站点';
		} else if (checked < total || checking > 0) {
			summary.textContent = '正在分析网络质量: ' + checked + '/' + total + '，' + checking + ' 个检测中，' + queued + ' 个排队中';
		} else if (failed === 0) {
			summary.textContent = '网络畅通无阻，所有站点均可访问';
		} else {
			summary.textContent = '网络局部受阻，' + failed + ' 个站点异常';
		}
		updateLatencyChart(checked, total);
		updateDistributionPanel(checked, total);
	}

	function getSiteById(siteId) {
		for (var i = 0; i < sitesData.length; i++) {
			if (sitesData[i].id === siteId) return sitesData[i];
		}
		return null;
	}

	function updateLatencyChart(checked, total) {
		var rows = [];
		var worstMs = 0;

		for (var id in checkResults) {
			var result = checkResults[id];
			var site = getSiteById(id);
			var ms = result && result.time_total ? Math.round(parseFloat(result.time_total) * 1000) : 0;
			var failed = !result || !result.ok || !ms;
			var score = failed ? 999999 : ms;
			if (!failed && ms > worstMs) worstMs = ms;
			rows.push({
				id: id,
				name: site ? site.name : (result.name || id),
				ms: ms,
				failed: failed,
				score: score
			});
		}

		rows.sort(function(a, b) {
			if (a.score !== b.score) return a.score - b.score;
			return a.name > b.name ? 1 : -1;
		});

		if (!rows.length) {
			chartSubtitle.textContent = total ? '测试开始后会实时生成延迟排行。' : '还没有可用于排序的站点。';
			chartList.innerHTML = '<div class="ipass-chart-empty">等待首个检测结果...</div>';
			return;
		}

		worstMs = Math.max(worstMs, 100);
		chartSubtitle.textContent = '已排序 ' + rows.length + '/' + total + ' 个站点，检测完成后排行会继续收敛。';
		chartList.innerHTML = '';
		for (var i = 0; i < rows.length; i++) {
			var row = rows[i];
			var width = row.failed ? 100 : Math.max(6, Math.min(100, Math.round((row.ms / worstMs) * 100)));
			var tone = getLatencyTone(row.ms / 1000, row.failed);
			var item = document.createElement('div');
			item.className = 'ipass-chart-row ' + tone;
			item.setAttribute('data-site-id', row.id);
			item.innerHTML =
				'<div class="ipass-chart-name"></div>' +
				'<div class="ipass-chart-track"><div class="ipass-chart-bar-fill"></div></div>' +
				'<div class="ipass-chart-value"></div>';
			item.querySelector('.ipass-chart-name').textContent = (i + 1) + '. ' + row.name;
			item.querySelector('.ipass-chart-value').textContent = row.failed ? '异常' : row.ms + 'ms';
			chartList.appendChild(item);
			item.querySelector('.ipass-chart-bar-fill').style.width = width + '%';
		}
	}

	function updateDistributionPanel(checked, total) {
		var samples = [];
		var markers = [];
		var failed = 0;

		for (var id in checkResults) {
			var result = checkResults[id];
			if (!result || !result.ok || !result.time_total) {
				failed++;
				continue;
			}
			var site = getSiteById(id);
			var ms = Math.round(parseFloat(result.time_total) * 1000);
			if (!ms || ms <= 0) {
				failed++;
				continue;
			}
			samples.push(ms);
			markers.push({
				id: id,
				name: site ? site.name : (result.name || id),
				ms: ms
			});
		}

		var stats = calculateLatencyStats(samples);
		var iqr = stats.p75 - stats.p25;
		var tailRatio = stats.median > 0 ? stats.p90 / stats.median : 0;
		distMedian.textContent = formatMs(stats.median);
		distP90.textContent = formatMs(stats.p90);
		distIqr.textContent = formatMs(iqr);
		distTail.textContent = formatRatio(tailRatio);
		distFailed.textContent = failed;
		distSample.textContent = stats.count + '/' + total;

		if (!stats.count) {
			distSubtitle.textContent = total ? '等待可用的成功检测样本，失败站点不参与延迟分布计算。' : '还没有可用于统计的站点。';
			distPlot.innerHTML = '<div class="ipass-dist-empty">等待成功站点样本...</div>';
			return;
		}

		distSubtitle.textContent = '成功样本 ' + stats.count + '/' + total + '；失败站点单独计入异常，不参与 P50/IQR/P90。';
		distPlot.innerHTML =
			'<div class="ipass-dist-axis">' +
				'<div class="ipass-dist-band" style="left:' + getLatencyPosition(stats.p25) + '%"><span>P25</span></div>' +
				'<div class="ipass-dist-band" style="left:' + getLatencyPosition(stats.median) + '%"><span>P50</span></div>' +
				'<div class="ipass-dist-band" style="left:' + getLatencyPosition(stats.p75) + '%"><span>P75</span></div>' +
				'<div class="ipass-dist-band" style="left:' + getLatencyPosition(stats.p90) + '%"><span>P90</span></div>' +
			'</div>';

		var axis = distPlot.querySelector('.ipass-dist-axis');
		markers.sort(function(a, b) { return a.ms - b.ms; });
		for (var i = 0; i < markers.length; i++) {
			var marker = markers[i];
			var pct = getLatencyPosition(marker.ms);
			var rankPct = markers.length === 1 ? 50 : Math.round((i / (markers.length - 1)) * 100);
			var relative = stats.median > 0 ? Math.round(((marker.ms - stats.median) / stats.median) * 100) : 0;
			var lane = 38 + ((i % 3) * 12);
			var tone = getLatencyTone(marker.ms / 1000, false);
			var dot = document.createElement('span');
			dot.className = 'ipass-dist-marker ' + tone;
			dot.style.left = pct + '%';
			dot.style.top = lane + '%';
			dot.setAttribute('data-label', marker.name + ' ' + marker.ms + 'ms P' + rankPct + ' ' + (relative >= 0 ? '+' : '') + relative + '%');
			axis.appendChild(dot);
		}
	}

	function applyFilters() {
		var visibleTotal = 0;

		for (var key in grids) {
			var grid = grids[key];
			var visibleInSection = 0;
			var cards = grid.querySelectorAll('.ipass-card');
			for (var i = 0; i < cards.length; i++) {
				var card = cards[i];
				var state = getCardState(card.getAttribute('data-site-id'));
				var visible = activeFilter === 'all' || state === activeFilter;
				card.style.display = visible ? '' : 'none';
				if (visible) visibleInSection++;
			}
			sections[key].style.display = visibleInSection ? 'block' : 'none';
			visibleTotal += visibleInSection;
		}

		emptyState.style.display = visibleTotal ? 'none' : 'block';
		filterbar.setAttribute('data-filter', activeFilter);
	}

	function createCard(site) {
		var card = document.createElement('div');
		var domain = getDomain(site.url);
		var logoUrl = domain ? 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(domain) + '&sz=64' : '<%=resource%>/cbi/help.png';

		if (domain.indexOf('xiaohongshu.com') !== -1) {
			logoUrl = 'https://www.xiaohongshu.com/favicon.ico';
		}

		card.id = 'card-' + site.id;
		card.className = 'ipass-card pending';
		card.setAttribute('data-site-id', site.id);
		card.innerHTML =
			'<div class="ipass-card-header">' +
				'<div class="ipass-logo-wrap"><img class="ipass-logo" alt=""></div>' +
				'<div class="ipass-name-box">' +
					'<div class="ipass-name-line"><span class="ipass-name"></span><span class="ipass-status-badge">待检测</span></div>' +
					'<span class="ipass-url"></span>' +
				'</div>' +
			'</div>' +
			'<div class="ipass-stats">' +
				'<div class="ipass-row dns-row"><span class="ipass-dot"></span><span class="ipass-label">DNS 解析</span><span class="ipass-val dns-val">-</span></div>' +
				'<div class="ipass-row http-row"><span class="ipass-dot"></span><span class="ipass-label">HTTP 连接</span><span class="ipass-val http-val">-</span></div>' +
				'<div class="ipass-row time-row"><span class="ipass-dot"></span><span class="ipass-label">网络时延</span><span class="ipass-val time-val">-</span></div>' +
			'</div>' +
			'<div class="ipass-latency-meter"><div class="ipass-latency-fill"></div></div>' +
			'<div class="ipass-footer">' +
				'<span class="ipass-time">等待检测</span>' +
				'<button class="ipass-recheck-btn" type="button">检测</button>' +
			'</div>';

		card.querySelector('.ipass-logo').src = logoUrl;
		card.querySelector('.ipass-logo').onerror = function() { this.src = '<%=resource%>/cbi/help.png'; };
		card.querySelector('.ipass-name').textContent = site.name;
		card.querySelector('.ipass-url').textContent = site.url;

		card.querySelector('.ipass-recheck-btn').addEventListener('click', function() {
			runSingleCheck(site.id);
		});

		return card;
	}

	function markQueuedCard(siteId) {
		var card = document.getElementById('card-' + siteId);
		if (!card) return;

		var recheckBtn = card.querySelector('.ipass-recheck-btn');
		var statusBadge = card.querySelector('.ipass-status-badge');
		var latencyFill = card.querySelector('.ipass-latency-fill');
		var errorDiv = card.querySelector('.ipass-error-msg');

		queuedSites[siteId] = true;
		delete checkingSites[siteId];
		delete checkResults[siteId];
		card.className = 'ipass-card queued';
		statusBadge.textContent = '排队中';
		recheckBtn.disabled = true;
		recheckBtn.textContent = '等待';
		card.querySelector('.dns-val').textContent = '等待';
		card.querySelector('.dns-val').style.color = '';
		card.querySelector('.http-val').textContent = '等待';
		card.querySelector('.http-val').style.color = '';
		card.querySelector('.time-val').textContent = '-';
		card.querySelector('.time-val').className = 'ipass-val time-val';
		card.querySelector('.ipass-time').textContent = '等待调度';
		latencyFill.style.width = '6%';
		setDot(card.querySelector('.dns-row'), '');
		setDot(card.querySelector('.http-row'), '');
		setDot(card.querySelector('.time-row'), '');
		if (errorDiv) errorDiv.parentNode.removeChild(errorDiv);
	}

	function updateCard(siteId, result, checking) {
		var card = document.getElementById('card-' + siteId);
		if (!card) return;

		var recheckBtn = card.querySelector('.ipass-recheck-btn');
		var statusBadge = card.querySelector('.ipass-status-badge');
		var timeVal = card.querySelector('.time-val');
		var latencyFill = card.querySelector('.ipass-latency-fill');
		var errorDiv = card.querySelector('.ipass-error-msg');

		if (checking) {
			checkingSites[siteId] = true;
			delete queuedSites[siteId];
			card.className = 'ipass-card checking';
			statusBadge.textContent = '检测中';
			recheckBtn.disabled = true;
			recheckBtn.textContent = '检测中';
			card.querySelector('.dns-val').textContent = '解析中';
			card.querySelector('.http-val').textContent = '等待';
			timeVal.textContent = '-';
			timeVal.className = 'ipass-val time-val';
			latencyFill.style.width = '18%';
			setDot(card.querySelector('.dns-row'), 'checking');
			setDot(card.querySelector('.http-row'), '');
			setDot(card.querySelector('.time-row'), '');
			if (errorDiv) errorDiv.parentNode.removeChild(errorDiv);
			applyFilters();
			return;
		}

		delete checkingSites[siteId];
		delete queuedSites[siteId];
		recheckBtn.disabled = false;
		recheckBtn.textContent = '重试';
		card.className = 'ipass-card ' + (result.ok ? 'ok' : 'fail');
		statusBadge.textContent = result.ok ? '畅通' : '异常';

		card.querySelector('.dns-val').textContent = result.dns_ok ? 'OK' : 'FAIL';
		card.querySelector('.dns-val').style.color = result.dns_ok ? '#19a86b' : '#df3f4f';
		setDot(card.querySelector('.dns-row'), result.dns_ok ? 'ok' : 'fail');

		var httpText = result.http_ok ? result.http_code : (result.http_code > 0 ? 'ERR ' + result.http_code : 'FAIL');
		card.querySelector('.http-val').textContent = httpText;
		card.querySelector('.http-val').style.color = result.http_ok ? '#19a86b' : '#df3f4f';
		setDot(card.querySelector('.http-row'), result.http_ok ? 'ok' : 'fail');

		if (result.time_total) {
			timeVal.textContent = Math.round(result.time_total * 1000) + ' ms';
			timeVal.className = 'ipass-val time-val ' + getLatencyClass(result.time_total);
			latencyFill.style.width = getLatencyWidth(result.time_total) + '%';
			setDot(card.querySelector('.time-row'), getLatencyClass(result.time_total) === 'val-slow' ? 'fail' : 'ok');
		} else {
			timeVal.textContent = '-';
			timeVal.className = 'ipass-val time-val';
			latencyFill.style.width = '0%';
			setDot(card.querySelector('.time-row'), result.ok ? 'ok' : 'fail');
		}

		card.querySelector('.ipass-time').textContent = result.checked_at ? '检测于 ' + result.checked_at.split(' ')[1] : '刚刚检测';

		if (!result.ok) {
			if (!errorDiv) {
				errorDiv = document.createElement('div');
				errorDiv.className = 'ipass-error-msg';
				card.insertBefore(errorDiv, card.querySelector('.ipass-footer'));
			}
			errorDiv.textContent = result.error_message || result.error_type || '连接失败';
		} else if (errorDiv) {
			errorDiv.parentNode.removeChild(errorDiv);
		}

		applyFilters();
	}

	function isAllChecksFinished() {
		return Object.keys(checkResults).length === sitesData.length && activeChecks === 0 && checkQueue.length === 0;
	}

	function finishCheck(siteId, result) {
		checkResults[siteId] = result;
		updateCard(siteId, result, false);
		activeChecks = Math.max(0, activeChecks - 1);
		updateSummary();
		startNextQueuedChecks();
		if (isAllChecksFinished()) {
			btnCheckAll.disabled = false;
		}
	}

	function runCheckRequest(siteId) {
		activeChecks++;
		updateCard(siteId, null, true);
		updateSummary();

		fetch(checkEndpoint + '?id=' + encodeURIComponent(siteId), { credentials: 'same-origin' })
			.then(function(res) { return res.json(); })
			.then(function(data) {
				var res = (data && data.results && data.results[0]) || { ok: false, error_type: 'network_error', error_message: '检测结果为空' };
				finishCheck(siteId, res);
			})
			.catch(function() {
				var err = { ok: false, dns_ok: false, http_ok: false, http_code: 0, time_total: 0, error_message: '网络请求超时' };
				finishCheck(siteId, err);
			});
	}

	function startNextQueuedChecks() {
		while (activeChecks < MAX_CONCURRENT_CHECKS && checkQueue.length > 0) {
			var siteId = checkQueue.shift();
			if (!queuedSites[siteId]) continue;
			runCheckRequest(siteId);
		}
		applyFilters();
	}

	function queueSingleCheck(siteId, front) {
		if (checkingSites[siteId] || queuedSites[siteId]) return;
		btnCheckAll.disabled = true;
		markQueuedCard(siteId);
		if (front) checkQueue.unshift(siteId);
		else checkQueue.push(siteId);
		updateSummary();
		applyFilters();
		startNextQueuedChecks();
	}

	function runSingleCheck(siteId) {
		queueSingleCheck(siteId, true);
	}

	function runAllChecks() {
		btnCheckAll.disabled = true;
		checkResults = {};
		checkingSites = {};
		queuedSites = {};
		checkQueue = [];
		activeChecks = 0;
		if (sitesData.length === 0) {
			btnCheckAll.disabled = false;
			updateSummary();
			applyFilters();
			return;
		}
		for (var i = 0; i < sitesData.length; i++) {
			markQueuedCard(sitesData[i].id);
			checkQueue.push(sitesData[i].id);
		}
		updateSummary();
		applyFilters();
		startNextQueuedChecks();
	}

	filterbar.addEventListener('click', function(ev) {
		var target = ev.target;
		if (!target || !target.getAttribute || !target.getAttribute('data-filter')) return;
		activeFilter = target.getAttribute('data-filter');
		var buttons = filterbar.querySelectorAll('.ipass-filter-btn');
		for (var i = 0; i < buttons.length; i++) {
			buttons[i].className = buttons[i] === target ? 'ipass-filter-btn active' : 'ipass-filter-btn';
		}
		applyFilters();
	});

	fetch(listEndpoint, { credentials: 'same-origin' })
		.then(function(res) { return res.json(); })
		.then(function(data) {
			sitesData = data.sites || [];

			for (var key in grids) {
				grids[key].innerHTML = '';
			}

			for (var i = 0; i < sitesData.length; i++) {
				var site = sitesData[i];
				var targetGrid = grids[site.category] || grids['other'];
				targetGrid.appendChild(createCard(site));
			}

			updateSummary();
			applyFilters();
			runAllChecks();
		})
		.catch(function() {
			summary.textContent = '初始化失败，请检查 iPass 服务状态。';
		});

	btnCheckAll.addEventListener('click', runAllChecks);
}());
</script>
